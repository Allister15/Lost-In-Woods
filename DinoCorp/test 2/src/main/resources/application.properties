spring.application.name=lost-in-woods

# H2 in-memory database for local development
spring.datasource.url=jdbc:h2:mem:lostdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Anthropic API key (set via environment variable: ANTHROPIC_API_KEY)
anthropic.api.key=${ANTHROPIC_API_KEY:MOCK_KEY}

