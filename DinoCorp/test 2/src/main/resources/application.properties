spring.application.name=lost-in-woods
# Profile selection:
#   - Locally: defaults to "local" (loads application-local.yml with your dev secrets).
#   - Railway / prod: set SPRING_PROFILES_ACTIVE=prod (or any other name) in the
#     environment to avoid Spring complaining about the missing local YAML.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Port: Railway injects PORT (random per deployment). Locally falls back to 8080.
server.port=${PORT:8080}

## H2 in-memory database for local development
#spring.datasource.url=jdbc:h2:mem:lostdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate settings

spring.jpa.show-sql=false

# Anthropic API key (set via environment variable: ANTHROPIC_API_KEY)
anthropic.api.key=${ANTHROPIC_API_KEY:MOCK_KEY}

# OpenRouter LLM (the secret api-key is supplied by application-local.yml or the OPENROUTER_API_KEY env var)
ai.openrouter.base-url=https://openrouter.ai/api
#ai.openrouter.model=z-ai/glm-4.5-air:free
ai.openrouter.model=openrouter/owl-alpha
# ai.openrouter.model=google/gemma-4-26b-a4b-it:free
ai.openrouter.api-key=${OPENROUTER_API_KEY:}

# Streaming endpoints (/story/start/stream, /story/choose/stream) can take 30-90s
# on the free tier while the model generates. Spring's default async timeout is
# 30s and will interrupt the response mid-stream (manifests as
# java.lang.InterruptedException on the client). Bump to 3 minutes so even slow
# free-tier beats finish cleanly.
spring.mvc.async.request-timeout=180000

# PostgreSQL — env-driven so the same config works locally AND on Railway.
#   Locally: leave the env vars unset; the defaults connect to localhost:5432.
#   Railway: set DATABASE_URL, DB_USERNAME, DB_PASSWORD in the dashboard (see
#   "Connect" tab of your Postgres add-on for the values).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/Lostdb}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
